<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Robo Kart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mobile-controls-height: 0px;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      font-family: monospace;
      overflow: hidden;
      padding: max(env(safe-area-inset-top), 10px)
               max(env(safe-area-inset-right), 10px)
               calc(max(env(safe-area-inset-bottom), 10px) + var(--mobile-controls-height))
               max(env(safe-area-inset-left), 10px);
    }

    #game-container {
      position: relative;
      width: min(100vw - 20px, calc((100svh - var(--mobile-controls-height) - 20px) * 16 / 9));
      max-width: 100%;
    }

    #game-container canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      border: 2px solid #1a1a3a;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.25);
      touch-action: none;
    }

    /* Loading overlay shown before Phaser boots */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 3rem;
      color: #e94560;
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(233,69,96,0.6);
      margin-bottom: 1.2rem;
    }

    #loading p {
      color: #5555aa;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #1a1a3a;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 1.8rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #orientation-tip {
      display: none;
      position: fixed;
      top: max(env(safe-area-inset-top), 12px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9000;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(11, 12, 24, 0.86);
      color: #f5c7d1;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    #mobile-controls {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8500;
      padding:
        10px
        max(env(safe-area-inset-right), 12px)
        max(env(safe-area-inset-bottom), 12px)
        max(env(safe-area-inset-left), 12px);
      background: linear-gradient(180deg, rgba(13,13,26,0) 0%, rgba(13,13,26,0.88) 32%, rgba(13,13,26,0.96) 100%);
      pointer-events: none;
    }

    #mobile-controls.visible {
      display: block;
    }

    body.mobile-controls-visible {
      --mobile-controls-height: 188px;
    }

    .mobile-controls-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      pointer-events: none;
    }

    .mobile-controls-cluster {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .mobile-controls-drive {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(2, 58px);
      gap: 8px;
      pointer-events: auto;
    }

    .mobile-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      background: rgba(29, 31, 56, 0.86);
      color: #f3f1ff;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
      font: 700 22px/1 monospace;
      min-width: 58px;
      min-height: 58px;
      padding: 0 14px;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    .mobile-btn:active,
    .mobile-btn.active {
      transform: translateY(1px) scale(0.98);
      background: rgba(233, 69, 96, 0.92);
      border-color: rgba(255,255,255,0.34);
    }

    .mobile-btn.small-label {
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .mobile-btn.up {
      grid-column: 2;
      grid-row: 1;
    }

    .mobile-btn.left {
      grid-column: 1;
      grid-row: 2;
    }

    .mobile-btn.down {
      grid-column: 2;
      grid-row: 2;
    }

    .mobile-btn.right {
      grid-column: 3;
      grid-row: 2;
    }

    @media (pointer: coarse), (max-width: 900px) {
      #orientation-tip {
        display: block;
      }
    }

    @media (pointer: coarse) and (orientation: landscape) {
      #orientation-tip {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .mobile-controls-drive {
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(2, 52px);
      }

      .mobile-btn {
        min-width: 52px;
        min-height: 52px;
        border-radius: 16px;
        font-size: 20px;
      }

      .mobile-btn.small-label {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Loading splash (auto-hidden once Phaser fires its 'ready' boot) -->
  <div id="loading">
    <h1>ROBO KART</h1>
    <p>LOADING ENGINES…</p>
    <div class="spinner"></div>
  </div>

  <div id="orientation-tip">Rotate To Landscape For Best Play</div>
  <div id="game-container"></div>
  <div id="mobile-controls" aria-hidden="true">
    <div class="mobile-controls-row">
      <div class="mobile-controls-drive">
        <button class="mobile-btn up" data-hold="up" aria-label="Accelerate">▲</button>
        <button class="mobile-btn left" data-hold="left" aria-label="Steer left">◀</button>
        <button class="mobile-btn down" data-hold="down" aria-label="Reverse or brake">▼</button>
        <button class="mobile-btn right" data-hold="right" aria-label="Steer right">▶</button>
      </div>
      <div class="mobile-controls-cluster">
        <button class="mobile-btn small-label" data-tap="item1" aria-label="Use item slot one">Z</button>
        <button class="mobile-btn small-label" data-tap="item2" aria-label="Use item slot two">X</button>
        <button class="mobile-btn small-label" data-tap="camera" aria-label="Toggle camera">CAM</button>
      </div>
    </div>
  </div>

  <!-- Phaser 3 from CDN (global `Phaser` variable, must load before game.js) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!--
    game.js uses ES module imports.
    Phaser is already a global by the time this executes (script tags are
    parsed top-to-bottom, and classic scripts run before deferred modules).
  -->
  <script type="module" src="src/game.js"></script>

  <script>
    const mobileControls = {
      active: window.matchMedia('(pointer: coarse)').matches || window.innerWidth <= 900,
      visible: false,
      hold: { up: false, down: false, left: false, right: false },
      taps: { item1: 0, item2: 0, camera: 0 },
      setVisible(nextVisible) {
        this.visible = this.active && nextVisible;
        document.getElementById('mobile-controls').classList.toggle('visible', this.visible);
        document.body.classList.toggle('mobile-controls-visible', this.visible);
      },
    };
    window.__robokartMobile = mobileControls;

    const clearHold = key => {
      mobileControls.hold[key] = false;
      document.querySelector(`[data-hold="${key}"]`)?.classList.remove('active');
    };

    document.querySelectorAll('[data-hold]').forEach(button => {
      const key = button.dataset.hold;
      const press = event => {
        event.preventDefault();
        mobileControls.hold[key] = true;
        button.classList.add('active');
      };
      const release = event => {
        event.preventDefault();
        clearHold(key);
      };
      button.addEventListener('pointerdown', press);
      button.addEventListener('pointerup', release);
      button.addEventListener('pointercancel', release);
      button.addEventListener('pointerleave', release);
    });

    document.querySelectorAll('[data-tap]').forEach(button => {
      const key = button.dataset.tap;
      button.addEventListener('pointerdown', event => {
        event.preventDefault();
        button.classList.add('active');
      });
      const fire = event => {
        event.preventDefault();
        mobileControls.taps[key] += 1;
        button.classList.remove('active');
      };
      button.addEventListener('pointerup', fire);
      button.addEventListener('pointercancel', () => button.classList.remove('active'));
      button.addEventListener('pointerleave', () => button.classList.remove('active'));
    });

    window.addEventListener('blur', () => {
      Object.keys(mobileControls.hold).forEach(clearHold);
    });

    window.addEventListener('robokart-controls', event => {
      mobileControls.setVisible(Boolean(event.detail?.visible));
    });

    // Hide the loading overlay once the window has fully loaded
    // (Phaser will have booted and painted its first frame by then).
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 600);
    });
  </script>

</body>
</html>
