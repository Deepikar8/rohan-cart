<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robo Kart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      overflow: hidden;
    }

    #game-container {
      /* Phaser mounts the canvas here */
      position: relative;
    }

    #game-container canvas {
      display: block;
      border: 2px solid #1a1a3a;
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.25);
    }

    /* Loading overlay shown before Phaser boots */
    #loading {
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 3rem;
      color: #e94560;
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(233,69,96,0.6);
      margin-bottom: 1.2rem;
    }

    #loading p {
      color: #5555aa;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #1a1a3a;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 1.8rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading splash (auto-hidden once Phaser fires its 'ready' boot) -->
  <div id="loading">
    <h1>ROBO KART</h1>
    <p>LOADING ENGINES…</p>
    <div class="spinner"></div>
  </div>

  <div id="game-container"></div>

  <!-- Phaser 3 from CDN (global `Phaser` variable, must load before game.js) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!--
    game.js uses ES module imports.
    Phaser is already a global by the time this executes (script tags are
    parsed top-to-bottom, and classic scripts run before deferred modules).
  -->
  <script type="module" src="src/game.js"></script>

  <script>
    // Hide the loading overlay once the window has fully loaded
    // (Phaser will have booted and painted its first frame by then).
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 600);
    });
  </script>

</body>
</html>
